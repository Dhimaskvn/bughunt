# Drop into any repo as .github/workflows/sisakulint.yml.
name: sisakulint

on:
  pull_request:
    paths: [".github/workflows/**"]
  push:
    branches: ["main"]
    paths: [".github/workflows/**"]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: sisaku-security/sisakulint-action/.github/workflows/scan.yml@604b94b3526b39662d2109e0259223beeac36136  # v1.0.0
    with:
      fail-on: critical
      upload-sarif: true
